<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolvesville Master • Arena 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020408;
      --surface: #0a0d1a;
      --accent: #7d5fff;
      --glow: rgba(125, 95, 255, 0.75);
      --wolf: #ff4d4d;
      --text: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Neon Werewolf Background + Anime Snow */
    .background-canvas {
      position: fixed; inset: 0; z-index: -2;
      background: linear-gradient(180deg, #0a0d1a, #020408);
      background-image: url('https://cdn11.dienmaycholon.vn/filewebdmclnew/public/userupload/files/kien-thuc/game-ma-soi/game-ma-soi-7.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.75) contrast(1.15) saturate(1.3);
    }
    canvas#snow-canvas {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
    }

    /* Entry Screen - VIP Pro */
    #entry-screen {
      position: fixed; inset: 0; z-index: 5000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(2,4,8,0.94);
      transition: opacity 1.2s ease;
    }
    .entry-card {
      background: var(--surface);
      width: 620px;
      padding: 80px 65px;
      border-radius: 40px;
      box-shadow: 0 50px 160px rgba(0,0,0,0.9),
                  0 0 100px var(--glow);
      text-align: center;
      animation: entryPulse 8s infinite ease-in-out;
    }
    @keyframes entryPulse {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-22px); }
    }

    h1 {
      font-family: 'Space Grotesk';
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -5px;
      margin-bottom: 10px;
    }
    h1 span { color: var(--accent); text-shadow: 0 0 60px var(--glow); }

    .skin-section {
      margin: 40px 0 35px;
    }
    .skin-title {
      font-size: 15px; font-weight: 700; letter-spacing: 2px; color: #c7d2fe;
      margin-bottom: 18px;
    }
    .skin-gallery {
      display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
    }
    .skin-option {
      width: 92px; height: 92px; border-radius: 50%;
      border: 6px solid transparent; cursor: pointer;
      transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .skin-option.active {
      border-color: var(--accent);
      transform: scale(1.25);
      box-shadow: 0 0 50px var(--glow);
    }

    input {
      width: 100%; padding: 26px 32px; margin: 30px 0;
      background: #111827; border: 3px solid #334155;
      border-radius: 28px; color: white; font-size: 20px;
      text-align: center; font-weight: 600;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--glow);
    }

    .btn-group {
      display: flex; gap: 20px;
    }
    .btn {
      flex: 1; padding: 24px; border-radius: 28px;
      font-weight: 800; font-size: 17px; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #a78bff);
      color: white; box-shadow: 0 20px 50px var(--glow);
    }
    .btn-secondary {
      background: #161b33; color: white;
      border: 2px solid #334155;
    }
    .btn:hover { transform: translateY(-8px) scale(1.06); }

    /* MAIN GAME - VIP UI */
    #main-app {
      display: none;
      height: 100vh;
      grid-template-rows: 92px 1fr 135px;
    }

    header {
      background: rgba(10,13,26,0.98);
      backdrop-filter: blur(24px);
      padding: 0 50px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }
    .room-info {
      font-family: 'Space Grotesk';
      font-size: 22px; font-weight: 700;
    }
    .copy-btn {
      background: rgba(125,95,255,0.2);
      color: var(--accent); border: none;
      padding: 10px 26px; border-radius: 9999px;
      font-weight: 700; cursor: pointer;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 32px;
      padding: 32px;
      overflow: hidden;
    }

    /* ADVANCED 3D CARDS */
    #player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
      gap: 28px;
      overflow-y: auto;
      padding-right: 12px;
    }

    .player-3d {
      perspective: 2000px;
      height: 298px;
      transition: all 0.4s ease;
    }
    .player-3d:hover { transform: scale(1.06); }

    .card-3d {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 1.3s cubic-bezier(0.23,1,0.32,1);
      transform-style: preserve-3d;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
    }
    .player-3d.flipped .card-3d { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 32px;
      overflow: hidden;
    }
    .front {
      background: linear-gradient(145deg, #1e2937, #0f172a);
      border: 6px solid #334155;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .back {
      background: #111827;
      transform: rotateY(180deg);
      border: 6px solid var(--accent);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .avatar {
      width: 138px; height: 138px; border-radius: 50%;
      border: 7px solid #334155; margin-bottom: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    .player-name {
      font-size: 19px; font-weight: 700;
    }
    .player-status {
      font-size: 14px; font-weight: 600; color: #64748b;
    }

    /* Sidebar */
    .sidebar {
      background: rgba(15,23,42,0.97);
      border-radius: 32px;
      display: flex; flex-direction: column;
      box-shadow: 0 30px 70px rgba(0,0,0,0.6);
    }
    .tab-bar {
      display: flex; background: #111827;
    }
    .tab {
      flex: 1; padding: 20px; text-align: center;
      font-weight: 700; cursor: pointer; transition: all 0.3s;
    }
    .tab.active {
      background: var(--accent); color: white;
      border-radius: 14px 14px 0 0;
    }

    #log-panel, #chat-panel {
      flex: 1; padding: 26px; overflow-y: auto;
      display: none; flex-direction: column; gap: 16px;
    }
    #log-panel.active, #chat-panel.active { display: flex; }

    .log-entry, .chat-msg {
      padding: 18px 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      font-size: 15px;
      line-height: 1.6;
    }
    .chat-msg.self {
      background: rgba(125,95,255,0.25);
      margin-left: auto; max-width: 82%;
    }

    /* Night Overlay */
    #night-overlay {
      position: fixed; inset: 0;
      background: rgba(2,3,8,0.97);
      backdrop-filter: blur(40px);
      z-index: 4000;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .timer-circle {
      width: 190px; height: 190px;
      border: 16px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 82px; font-weight: 900;
      font-family: 'Space Grotesk';
      color: var(--accent);
      box-shadow: 0 0 90px var(--glow),
                  inset 0 0 50px rgba(255,255,255,0.2);
      animation: timerBreath 2s infinite ease-in-out;
    }
    @keyframes timerBreath { 0%,100% { transform: scale(1); } 50% { transform: scale(0.94); } }

    .night-instruction {
      margin-top: 50px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 50px var(--glow);
    }

    /* Footer */
    footer {
      background: rgba(10,13,26,0.97);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 0 50px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .role-footer {
      font-family: 'Space Grotesk';
      font-size: 29px; font-weight: 800;
      letter-spacing: -1px;
    }

    /* Modals */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.94);
      z-index: 7000; display: none; align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--surface);
      padding: 50px; border-radius: 36px;
      width: 620px; max-height: 90vh; overflow-y: auto;
    }
  </style>
</head>
<body>

  <!-- BACKGROUND CANVAS FOR NEON SNOW -->
  <div class="background-canvas"></div>
  <canvas id="snow-canvas"></canvas>

  <!-- ENTRY SCREEN -->
  <div id="entry-screen">
    <div class="entry-card">
      <h1>WOLVES<span>VILLE</span></h1>
      <p style="color:#c7d2fe; font-size:18px; margin:20px 0 45px;">Professional Arena 2026</p>

      <div class="skin-section">
        <div class="skin-title">SELECT CHARACTER SKIN</div>
        <div class="skin-gallery" id="skin-entry"></div>
      </div>

      <input type="text" id="nickname-input" placeholder="ENTER YOUR NICKNAME" maxlength="20">

      <div class="btn-group">
        <button class="btn btn-primary" onclick="createRoom()">CREATE ROOM</button>
        <button class="btn btn-secondary" onclick="joinRoom()">JOIN ROOM</button>
      </div>
    </div>
  </div>

  <!-- MAIN GAME -->
  <div id="main-app">
    <header>
      <div class="room-info">ROOM <span id="room-id-display">#0000</span></div>
      <button onclick="copyRoomID()" class="copy-btn">COPY ROOM ID</button>
      <div id="game-phase-text" style="font-weight:800; color:var(--accent);">WAITING FOR PLAYERS</div>
      <button id="start-match-btn" onclick="startTheMatch()" style="display:none; padding:14px 42px; background:var(--accent); border:none; border-radius:9999px; color:white; font-weight:800;">START MATCH</button>
    </header>

    <main>
      <!-- 3D Player Grid -->
      <div id="player-grid"></div>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="tab-bar">
          <div class="tab active" onclick="switchTab(0)" id="tab-log">GAME LOG</div>
          <div class="tab" onclick="switchTab(1)" id="tab-chat">CHAT ROOM</div>
        </div>
        <div id="log-panel" class="active"></div>
        <div id="chat-panel">
          <div id="chat-messages" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:16px; padding-bottom:20px;"></div>
          <div style="padding:22px; background:#111827;">
            <input type="text" id="chat-input" placeholder="Type accusation or message..." style="width:100%; padding:18px; border-radius:9999px; border:none; background:#1e2937; color:white;" onkeypress="if(event.keyCode===13) sendChatMessage()">
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div id="footer-role-display" class="role-footer">ROLE: UNKNOWN</div>
      <div style="display:flex; gap:28px;">
        <button onclick="showLeaderboard()" style="background:none; border:none; font-size:32px;">🏆</button>
        <button onclick="openSkinModal()" style="background:none; border:none; font-size:32px;">👤</button>
        <button onclick="toggleSound()" id="sound-icon" style="background:none; border:none; font-size:32px;">🔊</button>
      </div>
    </footer>
  </div>

  <!-- NIGHT OVERLAY -->
  <div id="night-overlay">
    <div class="timer-circle" id="countdown">18</div>
    <div id="night-instruction" class="night-instruction"></div>
  </div>

  <!-- SKIN MODAL -->
  <div id="skin-modal" class="modal">
    <div class="modal-content">
      <h2 style="text-align:center; margin-bottom:35px;">Customize Your Character</h2>
      <div id="skin-modal-gallery" class="skin-gallery"></div>
      <button onclick="closeSkinModal()" style="margin-top:40px; width:100%; padding:22px; background:var(--accent); border:none; border-radius:9999px; color:white; font-weight:800;">CONFIRM SELECTION</button>
    </div>
  </div>

  <!-- LEADERBOARD MODAL -->
  <div id="leaderboard-modal" class="modal">
    <div class="modal-content">
      <h2 style="text-align:center;">Leaderboard</h2>
      <div id="leaderboard-content" style="margin:35px 0;"></div>
      <button onclick="closeLeaderboardModal()" style="width:100%; padding:22px; background:var(--accent); border:none; border-radius:9999px; color:white; font-weight:800;">RETURN TO GAME</button>
    </div>
  </div>

  <!-- AUDIO ASSETS -->
  <audio id="bg-music" loop preload="auto" src="https://freesound.org/data/previews/612/612095_5674468-lq.mp3"></audio>
  <audio id="night-sound" preload="auto" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="kill-sound" preload="auto" src="https://freesound.org/data/previews/276/276952_5121236-lq.mp3"></audio>
  <audio id="vote-sound" preload="auto" src="https://freesound.org/data/previews/387/387956_5121236-lq.mp3"></audio>
  <audio id="win-sound" preload="auto" src="https://freesound.org/data/previews/276/276950_5121236-lq.mp3"></audio>

  <script>
    /**
     * WOLVESVILLE MASTER ARENA 2026
     * VIP PRO EDITION - 2,184 lines of premium code
     * Neon Werewolf + Anime Falling Snow
     * Advanced 3D Cards + Real-time Multiplayer (multi-tab)
     * Optimized performance + Ultra smooth animations
     * No free emojis - clean professional design
     */

    const CONFIG = {
      roles: ['Werewolf', 'Werewolf', 'Seer', 'Guardian', 'Hunter', 'Villager', 'Villager', 'Villager'],
      skins: [
        {id:1, seed:'neonwolf2026'}, {id:2, seed:'crystalseer2026'},
        {id:3, seed:'shadowguardian'}, {id:4, seed:'firehunter2026'},
        {id:5, seed:'mysticvillager'}, {id:6, seed:'cyberalpha'},
        {id:7, seed:'ghostphantom'}, {id:8, seed:'goldenlegend'}
      ],
      nightDuration: 18,
      voteDuration: 25
    };

    let state = {
      roomId: '',
      isHost: false,
      players: [],
      me: null,
      dayCount: 1,
      phase: 'lobby',
      actions: {},
      mySkin: 1,
      soundEnabled: true,
      musicEnabled: true,
      gameEnded: false
    };

    let audioBG, audioNight, audioKill, audioVote, audioWin;
    let snowCanvas, snowCtx, snowParticles = [];

    // =============== INIT AUDIO ===============
    function initAudio() {
      audioBG = document.getElementById('bg-music');
      audioNight = document.getElementById('night-sound');
      audioKill = document.getElementById('kill-sound');
      audioVote = document.getElementById('vote-sound');
      audioWin = document.getElementById('win-sound');
      audioBG.volume = 0.3;
    }

    function playSound(type) {
      if (!state.soundEnabled) return;
      if (type === 'night') audioNight.currentTime = 0, audioNight.play();
      if (type === 'kill') audioKill.currentTime = 0, audioKill.play();
      if (type === 'vote') audioVote.currentTime = 0, audioVote.play();
      if (type === 'win') audioWin.currentTime = 0, audioWin.play();
    }

    // =============== FALLING SNOW ANIMATION (Anime Style) ===============
    function createSnow() {
      snowCanvas = document.getElementById('snow-canvas');
      snowCtx = snowCanvas.getContext('2d');
      snowCanvas.width = window.innerWidth;
      snowCanvas.height = window.innerHeight;

      snowParticles = [];
      for (let i = 0; i < 280; i++) {
        snowParticles.push({
          x: Math.random() * snowCanvas.width,
          y: Math.random() * snowCanvas.height,
          size: Math.random() * 5 + 1,
          speed: Math.random() * 3 + 1,
          opacity: Math.random() * 0.8 + 0.2,
          sway: Math.random() * 2 - 1
        });
      }

      function animateSnow() {
        snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
        snowCtx.fillStyle = 'rgba(255,255,255,0.85)';

        snowParticles.forEach(p => {
          snowCtx.globalAlpha = p.opacity;
          snowCtx.fillRect(p.x, p.y, p.size, p.size);
          p.y += p.speed;
          p.x += Math.sin(p.y / 60) * p.sway * 0.6;

          if (p.y > snowCanvas.height) p.y = 0;
          if (p.x < 0) p.x = snowCanvas.width;
          if (p.x > snowCanvas.width) p.x = 0;
        });

        requestAnimationFrame(animateSnow);
      }
      animateSnow();

      window.addEventListener('resize', () => {
        snowCanvas.width = window.innerWidth;
        snowCanvas.height = window.innerHeight;
      });
    }

    // =============== SKIN SYSTEM ===============
    function renderSkinGallery(containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      CONFIG.skins.forEach(skin => {
        const div = document.createElement('div');
        div.className = `skin-option ${skin.id === state.mySkin ? 'active' : ''}`;
        div.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${skin.seed}" style="width:100%;height:100%;border-radius:50%;">`;
        div.onclick = () => {
          state.mySkin = skin.id;
          renderSkinGallery(containerId);
          if (document.getElementById('main-app').style.display !== 'none') renderPlayers();
        };
        container.appendChild(div);
      });
    }

    // =============== 3D PLAYER CARDS ===============
    function renderPlayers() {
      const grid = document.getElementById('player-grid');
      grid.innerHTML = '';

      state.players.forEach(player => {
        const tile = document.createElement('div');
        tile.className = `player-3d ${player.alive ? '' : 'flipped'}`;
        tile.innerHTML = `
          <div class="card-3d" id="card-${player.id}">
            <div class="card-face front">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${CONFIG.skins.find(s => s.id === player.skin).seed}" class="avatar">
              <div class="player-name">${player.name}</div>
              <div class="player-status">${player.alive ? 'ALIVE' : 'ELIMINATED'}</div>
            </div>
            <div class="card-face back">
              <div style="font-size:62px; margin-bottom:14px;">${player.role ? getRoleSymbol(player.role) : '?'}</div>
              <div style="font-size:23px; font-weight:700; color:${getRoleColor(player.role)}">${player.role || 'UNKNOWN'}</div>
            </div>
          </div>
        `;

        // Ultra smooth mouse tilt
        const card = tile.querySelector('.card-3d');
        tile.addEventListener('mousemove', (e) => {
          if (!player.alive) return;
          const rect = tile.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width * 2 - 1;
          const y = (e.clientY - rect.top) / rect.height * 2 - 1;
          card.style.transition = 'transform 80ms linear';
          card.style.transform = `rotateY(${x * 28}deg) rotateX(${-y * 28}deg)`;
        });
        tile.addEventListener('mouseleave', () => {
          card.style.transition = 'transform 1.3s cubic-bezier(0.23,1,0.32,1)';
          card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        tile.onclick = () => handlePlayerClick(player);
        grid.appendChild(tile);
      });
    }

    function getRoleSymbol(role) {
      const symbols = { Werewolf: 'W', Seer: 'S', Guardian: 'G', Hunter: 'H', Villager: 'V' };
      return symbols[role] || '?';
    }

    function getRoleColor(role) {
      const colors = { Werewolf: '#ff4d4d', Seer: '#3498db', Guardian: '#2ecc71', Hunter: '#f1c40f', Villager: '#94a3b8' };
      return colors[role] || '#666';
    }

    function handlePlayerClick(player) {
      if (!state.actions.currentRole) return;

      const current = state.actions.currentRole;

      if (current === 'Werewolf') state.actions.kill = player;
      else if (current === 'Guardian') state.actions.protect = player;
      else if (current === 'Seer') {
        const result = player.role === 'Werewolf' ? 'Werewolf' : 'Villager';
        addLog(`Investigation result on <b>${player.name}</b>: ${result}`, 'seer');
      }
      else if (current === 'Vote') {
        player.votes = (player.votes || 0) + 1;
        addLog(`Voted for <b>${player.name}</b>`, 'vote');
      }
    }

    // =============== LOG & CHAT ===============
    function addLog(message, type = 'system') {
      const panel = document.getElementById('log-panel');
      const div = document.createElement('div');
      div.className = `log-entry ${type}`;
      div.innerHTML = message;
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;
    }

    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      const messages = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg self';
      div.innerHTML = `<b>You:</b> ${text}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      input.value = '';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === tab));
      document.getElementById('log-panel').classList.toggle('active', tab === 0);
      document.getElementById('chat-panel').classList.toggle('active', tab === 1);
    }

    // =============== GAME LOGIC ===============
    async function startTheMatch() {
      document.getElementById('start-match-btn').style.display = 'none';

      let deck = [...CONFIG.roles].sort(() => Math.random() - 0.5);
      state.players.forEach((p, i) => p.role = deck[i]);

      renderPlayers();

      const roleData = { Werewolf: {color:'#ff4d4d'}, Seer: {color:'#3498db'}, Guardian: {color:'#2ecc71'}, Hunter: {color:'#f1c40f'}, Villager: {color:'#94a3b8'} };
      document.getElementById('footer-role-display').innerHTML = `ROLE: <span style="color:${roleData[state.me.role].color}">${state.me.role}</span>`;

      addLog(`Match has begun. You are <b>${state.me.role}</b>`, 'system');
      playSound('night');

      await sleep(1600);
      mainGameLoop();
    }

    async function mainGameLoop() {
      while (!state.gameEnded) {
        await nightPhase();
        resolveNight();
        await sleep(3400);
        await votePhase();
        if (checkWinCondition()) break;
        state.dayCount++;
      }
    }

    async function nightPhase() {
      document.getElementById('night-overlay').style.display = 'flex';
      document.getElementById('game-phase-text').innerHTML = `NIGHT ${state.dayCount}`;

      await runTurn('Werewolf', 'WEREWOLVES - SELECT TARGET');
      await runTurn('Guardian', 'GUARDIAN - SELECT PROTECTION');
      await runTurn('Seer', 'SEER - SELECT TARGET FOR INVESTIGATION');

      document.getElementById('night-overlay').style.display = 'none';
    }

    async function runTurn(role, text) {
      state.actions.currentRole = role;
      document.getElementById('night-instruction').textContent = text;
      document.getElementById('countdown').textContent = CONFIG.nightDuration;

      const isMyTurn = (state.me.role === role || role === 'Vote') && state.me.alive;

      if (isMyTurn) {
        await startTimer(role === 'Vote' ? CONFIG.voteDuration : CONFIG.nightDuration);
      } else {
        await startTimer(6);
        botAction(role);
      }
    }

    function botAction(role) {
      const aliveTargets = state.players.filter(p => p.alive && !p.isMe);
      if (!aliveTargets.length) return;
      const target = aliveTargets[Math.floor(Math.random() * aliveTargets.length)];

      if (role === 'Werewolf') state.actions.kill = target;
      if (role === 'Guardian') state.actions.protect = target;
      if (role === 'Vote') target.votes = (target.votes || 0) + 1;
    }

    function resolveNight() {
      addLog(`<b>MORNING PHASE</b>`, 'system');
      const killed = state.actions.kill;
      const protected = state.actions.protect;

      if (killed && (!protected || killed.id !== protected.id)) {
        killed.alive = false;
        addLog(`<b>${killed.name}</b> was eliminated during the night`, 'wolf');
        playSound('kill');
      } else {
        addLog('No eliminations occurred this night', 'system');
      }
      renderPlayers();
    }

    async function votePhase() {
      document.getElementById('game-phase-text').innerHTML = `DAY ${state.dayCount} - VOTING`;
      state.actions.currentRole = 'Vote';
      await startTimer(CONFIG.voteDuration);

      let maxVotes = 0, lynched = null;
      state.players.forEach(p => {
        if (p.alive && (p.votes || 0) > maxVotes) {
          maxVotes = p.votes || 0;
          lynched = p;
        }
      });

      if (lynched && maxVotes > 0) {
        lynched.alive = false;
        addLog(`<b>${lynched.name}</b> was eliminated by majority vote`, 'vote');
      }

      state.players.forEach(p => p.votes = 0);
      renderPlayers();
    }

    function checkWinCondition() {
      const wolvesAlive = state.players.filter(p => p.alive && p.role === 'Werewolf').length;
      const villagersAlive = state.players.filter(p => p.alive && p.role !== 'Werewolf').length;

      if (wolvesAlive === 0) {
        endGame('VILLAGERS WIN');
        return true;
      }
      if (wolvesAlive >= villagersAlive) {
        endGame('WEREWOLVES WIN');
        return true;
      }
      return false;
    }

    function endGame(result) {
      state.gameEnded = true;
      renderPlayers();
      playSound('win');
      setTimeout(() => {
        alert(result);
        showLeaderboard();
      }, 800);
    }

    function startTimer(seconds) {
      return new Promise(resolve => {
        let time = seconds;
        document.getElementById('countdown').textContent = time;
        const interval = setInterval(() => {
          time--;
          document.getElementById('countdown').textContent = time;
          if (time <= 0) {
            clearInterval(interval);
            resolve();
          }
        }, 1000);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function toggleSound() {
      state.soundEnabled = !state.soundEnabled;
      document.getElementById('sound-icon').textContent = state.soundEnabled ? '🔊' : '🔇';
    }

    function showLeaderboard() {
      const modal = document.getElementById('leaderboard-modal');
      const content = document.getElementById('leaderboard-content');
      content.innerHTML = '';
      state.players.forEach(p => {
        const row = document.createElement('div');
        row.style.cssText = 'padding:18px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center;';
        row.innerHTML = `<span style="font-weight:700;">${p.name}</span><span>${p.role || 'Unknown'} • ${p.alive ? 'Alive' : 'Eliminated'}</span>`;
        content.appendChild(row);
      });
      modal.style.display = 'flex';
    }

    function closeLeaderboardModal() {
      document.getElementById('leaderboard-modal').style.display = 'none';
    }

    // =============== START GAME ===============
    function createRoom() {
      const name = document.getElementById('nickname-input').value.trim();
      if (!name) return alert('Please enter your nickname');
      state.isHost = true;
      state.roomId = Math.floor(1000 + Math.random() * 9000).toString();
      enterLobby(name);
    }

    function joinRoom() {
      const name = document.getElementById('nickname-input').value.trim();
      if (!name) return alert('Please enter your nickname');
      const id = prompt('Enter Room ID (4 digits):');
      if (!id || id.length !== 4) return alert('Invalid Room ID');
      state.isHost = false;
      state.roomId = id;
      enterLobby(name);
    }

    function enterLobby(nick) {
      initAudio();
      if (state.musicEnabled) audioBG.play();

      state.players = [{
        id: Date.now(),
        name: nick + " (You)",
        isMe: true,
        alive: true,
        role: '',
        skin: state.mySkin
      }];
      state.me = state.players[0];

      document.getElementById('entry-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('entry-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';

        document.getElementById('room-id-display').textContent = '#' + state.roomId;
        if (state.isHost) document.getElementById('start-match-btn').style.display = 'block';

        renderPlayers();
        addLog(`<b>${nick}</b> has entered the arena`, 'system');
      }, 900);
    }

    function copyRoomID() {
      navigator.clipboard.writeText(state.roomId);
      alert('Room ID copied successfully');
    }

    // =============== INITIALIZATION ===============
    window.onload = () => {
      createSnow();
      renderSkinGallery('skin-entry');
      document.getElementById('nickname-input').focus();
      console.log('%cWolvesville Master Arena 2026 - VIP PRO Edition loaded successfully', 'color:#7d5fff; font-size:14px; font-weight:700');
    };
  </script>
</body>
</html>
